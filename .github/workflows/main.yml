name: Run API Test Cases

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

jobs:
  Ubuntu_Test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup JDK 21
        uses: actions/setup-java@v5.3.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.16

      - name: Run tests
        continue-on-error: true
        run: >
          mvn clean test

      - name: Generate Allure report
        run: mvn allure:report

      - name: Copy patch file to allure-maven-plugin folder
        run: cp .github/workflows/Open_Allure_Report.bat target/site/allure-maven-plugin

      - name: Upload Allure Report
        uses: actions/upload-artifact@v7
        with:
          name: Allure Report for API Tests
          path: "target/site/allure-maven-plugin"